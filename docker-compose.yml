version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: chessvid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: chessvid
    ports:
      - "5433:5432"
    volumes:
      - chessvid_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chessvid-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - chessvid_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chess-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8080
      - ANNOUNCED_IP=${ANNOUNCED_IP}
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5433/chessvid
      - REDIS_URL=redis://redis:6380
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: chess-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://server:8090

volumes:
  chessvid_pgdata:
  chessvid_redisdata: